<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZHELTER</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
@font-face {
    font-family: 'MasonChronicles';
    src: url('MasonChronicles.ttf') format('truetype');
}

.container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    font-size: clamp(32px, 8vw, 56px);
    letter-spacing: clamp(6px, 2vw, 14px);
    text-align: center;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'MasonChronicles', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    padding: 20px;

    background:
    radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 60%),
    linear-gradient(180deg, #000000 0%, #0a0a0a 100%),
    url('https://www.transparenttextures.com/patterns/asfalt-light.png');
}

/* ZHELTER — заголовок */
h1 {
    font-size: 56px;
    letter-spacing: 14px;
    color: #8B0000;
    margin-bottom: 15px;
    font-weight: 100;
    opacity: 0.95;
}

/* QR код */
#qrcode {
    margin: 25px 0;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.4);
}

/* Соцсети — ИСПРАВЛЕННЫЙ БЛОК */
.socials {
    display: flex;
    flex-direction: column;
    align-items: center;        /* Центрирование по горизонтали */
    gap: 18px;
    margin-top: 25px;
    width: 100%;
}

.socials a {
    font-size: 16px;
    text-decoration: none;
    color: white;
    letter-spacing: 2px;
    position: relative;
    transition: 0.3s;
    width: fit-content;
}

/* Подчёркивание при наведении */
.socials a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 1px;
    background: #8B0000;
    transition: 0.3s;
}

.socials a:hover {
    color: #8B0000;
    letter-spacing: 4px;
}

.socials a:hover::after {
    width: 100%;
}

/* Донат */
.donate {
    margin-top: 40px;
    width: 100%;
    display: flex;
    justify-content: center;
}

.donate a {
    text-decoration: none;
    padding: 14px 40px;
    border-radius: 40px;
    font-size: 18px;
    background: linear-gradient(45deg, #caa84c, gold);
    color: black;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
    width: 80%;
    text-align: center;
    max-width: 280px;
}

.donate a:hover {
    box-shadow: 0 0 30px gold;
    transform: scale(1.08);
}
</style>
</head>

<body>

<div class="container">
<h1>ZHELTER</h1>

<div id="qrcode"></div>

<div class="socials">
    <a href="https://youtube.com/@zhelter42?si=pKZfIv1Gngo9NqTA" target="_blank">YOUTUBE</a>
    <a href="https://www.instagram.com/zhelter42?igsh=MTh6YnVjbWZqdHdvNA%3D%3D&utm_source=qr" target="_blank">INSTAGRAM</a>
    <a href="https://open.spotify.com/artist/013pDnXPSCKdJwK4zmIMHf?si=0wpC4CiCS1GruTvVMi5Gnw" target="_blank">SPOTIFY</a>
</div>

<div class="donate">
    <a href="https://dalink.to/zhelter42" target="_blank">Donation</a>
</div>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 120,
    height: 120,
    colorDark: "#8B0000",
    colorLight: "#000000"
});
</script>

</div>
</body>
</html>
