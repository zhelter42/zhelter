<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhelter</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0b0b;
      font-family: serif;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      color: red;
      font-size: 42px;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .qr {
      width: 180px;
      height: 180px;
      margin: 20px auto;
      display: block;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .links a {
      color: #ddd;
      text-decoration: none;
      font-size: 18px;
      transition: 0.2s;
    }

    .links a:hover {
      color: white;
    }

    .donate {
      margin-top: 25px;
      padding: 15px 25px;
      border-radius: 25px;
      border: none;
      background: yellow;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .donate:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>ZHELTER</h1>

    <!-- ВСТАВЬ СЮДА СВОЙ QR -->
    <img src="qr.png" class="qr">

    <div class="links">
      <a href="#">YOUTUBE</a>
      <a href="#">INSTAGRAM</a>
      <a href="#">TIKTOK</a>
      <a href="#">SPOTIFY</a>
    </div>

    <button class="donate">Donation</button>

  </div>

</body>
</html>
